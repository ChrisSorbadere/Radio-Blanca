<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>Radio.es — Live Stream</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg-elev: #12121a;
    --bg-elev-2: #1a1a25;
    --border: #2a2a3a;
    --border-bright: #3a3a55;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --text-faint: #555570;
    --accent: #00f0c8;
    --accent-glow: rgba(0, 240, 200, 0.4);
    --magenta: #ff3ea5;
    --danger: #ff5577;
    --warn: #ffaa44;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    padding: 20px 16px 130px;
    max-width: 760px;
    margin: 0 auto;
    position: relative;
    background:
      radial-gradient(ellipse at top, rgba(0, 240, 200, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(255, 62, 165, 0.04) 0%, transparent 50%),
      var(--bg);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  header {
    padding: 16px 0 28px;
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .logo {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, #00b8a0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 0 24px var(--accent-glow);
  }

  .logo::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 8px;
    background: var(--bg);
  }

  .logo svg {
    position: relative;
    z-index: 1;
    color: var(--accent);
  }

  .brand-text h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .brand-text .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1.5px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .status-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    padding: 6px 10px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 100px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-pill .led {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 2;
  }

  .tab {
    flex: 1;
    padding: 14px 12px;
    border: none;
    background: transparent;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .tab .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg-elev);
    padding: 2px 7px;
    border-radius: 100px;
    border: 1px solid var(--border);
    min-width: 26px;
    text-align: center;
  }

  .tab.active .count {
    background: rgba(0, 240, 200, 0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
  }

  .search-box { flex: 1; position: relative; }

  .search-box input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-elev);
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    transition: all 0.2s;
  }

  .search-box input::placeholder { color: var(--text-faint); }

  .search-box input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg-elev-2);
    box-shadow: 0 0 0 3px rgba(0, 240, 200, 0.1);
  }

  .search-box svg {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
  }

  .toolbar-btn {
    padding: 0 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .toolbar-btn:hover {
    background: var(--bg-elev-2);
    color: var(--danger);
    border-color: var(--danger);
  }

  .stations {
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    z-index: 2;
  }

  .station {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .station::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: transparent;
    transition: background 0.2s;
  }

  .station:hover {
    border-color: var(--border-bright);
    background: var(--bg-elev-2);
  }

  .station:hover::before { background: var(--text-dim); }

  .station.playing {
    border-color: var(--accent);
    background: linear-gradient(90deg, rgba(0, 240, 200, 0.08) 0%, var(--bg-elev) 50%);
  }

  .station.playing::before {
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .station-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .station.playing .station-icon {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .station-info { flex: 1; min-width: 0; }

  .station-name {
    font-weight: 600;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .station-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .station.playing .station-meta { color: var(--accent); }

  .eq {
    display: none;
    align-items: center;
    gap: 2px;
    height: 14px;
  }

  .station.playing .eq { display: inline-flex; }

  .eq span {
    display: block;
    width: 2px;
    background: var(--accent);
    border-radius: 1px;
    animation: eq-bounce 0.8s ease-in-out infinite;
  }

  .eq span:nth-child(1) { height: 60%; animation-delay: 0s; }
  .eq span:nth-child(2) { height: 100%; animation-delay: 0.15s; }
  .eq span:nth-child(3) { height: 40%; animation-delay: 0.3s; }
  .eq span:nth-child(4) { height: 80%; animation-delay: 0.45s; }

  @keyframes eq-bounce {
    0%, 100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }

  .station-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    transition: all 0.2s;
  }

  .icon-btn:hover {
    background: var(--bg-elev-2);
    color: var(--text);
  }

  .fav-btn:hover { color: var(--magenta); }
  .fav-btn.active { color: var(--magenta); }
  .fav-btn.active svg {
    filter: drop-shadow(0 0 4px rgba(255, 62, 165, 0.5));
  }

  .delete-btn:hover {
    color: var(--danger);
    background: rgba(255, 85, 119, 0.1);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    border-radius: 16px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
  }

  .empty-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .empty-hint {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-dim);
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: 8px;
    animation: pulse-loading 1s ease-in-out infinite;
  }

  @keyframes pulse-loading {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .player {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.5);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10;
    backdrop-filter: blur(20px);
  }

  .player.visible { transform: translateY(0); }

  .player::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
    opacity: 0.6;
  }

  .player-icon {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: var(--accent);
    color: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .player-info { flex: 1; min-width: 0; }

  .player-name {
    font-weight: 600;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }

  .player-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
  }

  .player-status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: blink 1.2s ease-in-out infinite;
  }

  .player-status.error { color: var(--danger); }

  .player-status.error .dot {
    background: var(--danger);
    box-shadow: 0 0 8px var(--danger);
    animation: none;
  }

  .player-status.connecting { color: var(--warn); }

  .player-status.connecting .dot {
    background: var(--warn);
    box-shadow: 0 0 8px var(--warn);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .volume-row { display: none; }

  @media (min-width: 480px) {
    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
    }
    .volume-row input[type="range"] {
      width: 80px;
      accent-color: var(--accent);
    }
  }

  .player-btn {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .player-btn:hover { transform: scale(1.08); }
  .player-btn:active { transform: scale(0.95); }

  .player-btn.close {
    background: transparent;
    color: var(--text-dim);
    width: 36px;
    height: 36px;
    box-shadow: none;
    border: 1px solid var(--border);
  }

  .player-btn.close:hover {
    background: var(--bg-elev-2);
    color: var(--text);
    border-color: var(--border-bright);
  }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-elev-2);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 8px;
    border: 1px solid var(--border-bright);
    font-size: 13px;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0;
    transition: all 0.3s;
    z-index: 20;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }

  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-backdrop.visible { display: flex; }

  .modal {
    background: var(--bg-elev);
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    padding: 24px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
  }

  .modal h3 {
    font-size: 18px;
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .modal-btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    transition: all 0.2s;
  }

  .modal-btn:hover {
    background: var(--bg-elev-2);
    border-color: var(--border-bright);
  }

  .modal-btn.danger {
    background: var(--danger);
    color: white;
    border-color: var(--danger);
  }

  .modal-btn.danger:hover {
    background: #ff7088;
    border-color: #ff7088;
  }

  audio { display: none; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M5 12a7 7 0 0 1 14 0"/>
        <path d="M2 12a10 10 0 0 1 20 0"/>
      </svg>
    </div>
    <div class="brand-text">
      <h1>Radio.es</h1>
      <div class="tag">// Live Stream Engine</div>
    </div>
  </div>
  <div class="status-pill"><span class="led"></span><span>ONLINE</span></div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="all">
    <span>Todas</span>
    <span class="count" id="count-all">—</span>
  </button>
  <button class="tab" data-tab="favorites">
    <span>Favoritas</span>
    <span class="count" id="count-fav">0</span>
  </button>
</div>

<div class="toolbar">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar emisora o género...">
  </div>
  <button class="toolbar-btn" id="clear-all-btn" style="display:none" title="Vaciar favoritas">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
    </svg>
    <span>Vaciar</span>
  </button>
</div>

<div class="stations" id="stations">
  <div class="loading">Inicializando stream</div>
</div>

<div class="player" id="player">
  <div class="player-icon" id="player-icon">·</div>
  <div class="player-info">
    <div class="player-name" id="player-name">—</div>
    <div class="player-status" id="player-status"><span class="dot"></span><span id="status-text">EN DIRECTO</span></div>
  </div>
  <div class="volume-row">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <input type="range" id="volume" min="0" max="100" value="80">
  </div>
  <button class="player-btn" id="play-btn">
    <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l15 8-15 8z"/></svg>
  </button>
  <button class="player-btn close" id="close-btn" title="Detener">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h3 id="modal-title">¿Vaciar favoritas?</h3>
    <p id="modal-text">Se eliminarán todas tus emisoras favoritas. Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button class="modal-btn" id="modal-cancel">Cancelar</button>
      <button class="modal-btn danger" id="modal-confirm">Vaciar todo</button>
    </div>
  </div>
</div>

<audio id="audio" preload="none"></audio>

<script>
let STATIONS = [];

const API_SERVERS = [
  'https://de1.api.radio-browser.info',
  'https://de2.api.radio-browser.info',
  'https://at1.api.radio-browser.info',
  'https://nl1.api.radio-browser.info',
];

const CACHE_KEY = 'radio-espanola.stations-cache';
const CACHE_TTL = 1000 * 60 * 60 * 24 * 7;

const EXCLUDED_LANGUAGES = ['catalan', 'català', 'catalán'];
const EXCLUDED_TAGS_REGEX = /\b(catalan|catal[aà]|rac1|catalunya|catalogne|barcelona\sradio)\b/i;

function isCatalan(station) {
  const lang = (station.language || '').toLowerCase();
  if (EXCLUDED_LANGUAGES.some(l => lang.includes(l))) return true;
  const tags = (station.tags || '').toLowerCase();
  if (EXCLUDED_TAGS_REGEX.test(tags)) return true;
  if (EXCLUDED_TAGS_REGEX.test(station.name || '')) return true;
  return false;
}

function normalizeStation(s) {
  const tags = (s.tags || '').split(',').map(t => t.trim()).filter(Boolean);
  let genre = tags.slice(0, 2).join(' · ') || 'Radio';
  genre = genre.replace(/\b\w/g, c => c.toUpperCase());
  return {
    id: s.stationuuid,
    name: s.name.trim(),
    genre: genre,
    url: s.url_resolved || s.url,
  };
}

async function fetchStationsFromAPI() {
  const shuffled = [...API_SERVERS].sort(() => Math.random() - 0.5);
  for (const server of shuffled) {
    try {
      const res = await fetch(
        `${server}/json/stations/bycountrycodeexact/ES?limit=150&order=clickcount&reverse=true&hidebroken=true`
      );
      if (!res.ok) continue;
      return await res.json();
    } catch (e) {
      console.warn(`Servidor ${server} no disponible`);
    }
  }
  throw new Error('Ningún servidor disponible');
}

async function loadStations() {
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      const { timestamp, data } = JSON.parse(cached);
      if (Date.now() - timestamp < CACHE_TTL && Array.isArray(data) && data.length > 0) {
        STATIONS = data;
        return { source: 'cache' };
      }
    }
  } catch (e) {}

  try {
    const raw = await fetchStationsFromAPI();
    const filtered = raw
      .filter(s => !isCatalan(s))
      .filter(s => s.url_resolved || s.url)
      .filter(s => s.name && s.name.trim())
      .slice(0, 100)
      .map(normalizeStation);

    const seen = new Set();
    STATIONS = filtered.filter(s => {
      const key = s.name.toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        timestamp: Date.now(),
        data: STATIONS,
      }));
    } catch (e) {}

    return { source: 'api' };
  } catch (e) {
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const { data } = JSON.parse(cached);
        if (Array.isArray(data) && data.length > 0) {
          STATIONS = data;
          return { source: 'cache-fallback' };
        }
      }
    } catch (e2) {}
    throw e;
  }
}

let favorites = new Set();
let currentTab = 'all';
let currentStationId = null;
let isPlaying = false;
let searchQuery = '';
let hls = null;

const STORAGE_KEY_FAV = 'radio-espanola.favorites';
const STORAGE_KEY_VOL = 'radio-espanola.volume';

const audio = document.getElementById('audio');
const stationsEl = document.getElementById('stations');
const player = document.getElementById('player');
const playerName = document.getElementById('player-name');
const playerIcon = document.getElementById('player-icon');
const playerStatus = document.getElementById('player-status');
const statusText = document.getElementById('status-text');
const playBtn = document.getElementById('play-btn');
const playIcon = document.getElementById('play-icon');
const closeBtn = document.getElementById('close-btn');
const volumeSlider = document.getElementById('volume');
const searchInput = document.getElementById('search');
const toast = document.getElementById('toast');
const clearAllBtn = document.getElementById('clear-all-btn');
const modal = document.getElementById('modal');
const modalConfirm = document.getElementById('modal-confirm');
const modalCancel = document.getElementById('modal-cancel');
const modalTitle = document.getElementById('modal-title');
const modalText = document.getElementById('modal-text');

function loadFavorites() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_FAV);
    if (raw) favorites = new Set(JSON.parse(raw));
  } catch (e) {}
}

function saveFavorites() {
  try {
    localStorage.setItem(STORAGE_KEY_FAV, JSON.stringify([...favorites]));
  } catch (e) { console.error(e); }
}

function loadVolume() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_VOL);
    if (raw !== null) {
      const v = parseInt(raw);
      volumeSlider.value = v;
      audio.volume = v / 100;
    } else {
      audio.volume = 0.8;
    }
  } catch (e) { audio.volume = 0.8; }
}

function getInitial(name) {
  return name.replace(/^(Radio|Cadena|LOS|RNE|Onda|La)\s+/i, '').charAt(0).toUpperCase() || '?';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function getFilteredStations() {
  let list = currentTab === 'favorites'
    ? STATIONS.filter(s => favorites.has(s.id))
    : STATIONS;

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.genre.toLowerCase().includes(q)
    );
  }
  return list;
}

function render() {
  document.getElementById('count-all').textContent = STATIONS.length || '—';
  document.getElementById('count-fav').textContent = favorites.size;

  clearAllBtn.style.display = (currentTab === 'favorites' && favorites.size > 0) ? 'flex' : 'none';

  const list = getFilteredStations();

  if (list.length === 0) {
    if (currentTab === 'favorites' && favorites.size === 0) {
      stationsEl.innerHTML = `
        <div class="empty">
          <div class="empty-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </div>
          <div class="empty-text">Sin favoritas</div>
          <div class="empty-hint">Pulsa el corazón en cualquier emisora para añadirla aquí.</div>
        </div>`;
    } else {
      stationsEl.innerHTML = `
        <div class="empty">
          <div class="empty-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <div class="empty-text">Sin resultados</div>
          <div class="empty-hint">Prueba con otros términos de búsqueda.</div>
        </div>`;
    }
    return;
  }

  const isFavView = currentTab === 'favorites';

  stationsEl.innerHTML = list.map(s => `
    <div class="station ${currentStationId === s.id ? 'playing' : ''}" data-id="${s.id}">
      <div class="station-icon">${getInitial(s.name)}</div>
      <div class="station-info">
        <div class="station-name">
          <span class="eq"><span></span><span></span><span></span><span></span></span>
          ${escapeHtml(s.name)}
        </div>
        <div class="station-meta">${escapeHtml(s.genre)}</div>
      </div>
      <div class="station-actions">
        <button class="icon-btn fav-btn ${favorites.has(s.id) ? 'active' : ''}" data-fav="${s.id}" title="Favorita">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="${favorites.has(s.id) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
        ${isFavView ? `
        <button class="icon-btn delete-btn" data-delete="${s.id}" title="Quitar de favoritas">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
        </button>` : ''}
      </div>
    </div>
  `).join('');

  stationsEl.querySelectorAll('.station').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-fav]') || e.target.closest('[data-delete]')) return;
      playStation(el.dataset.id);
    });
  });

  stationsEl.querySelectorAll('[data-fav]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFavorite(btn.dataset.fav);
    });
  });

  stationsEl.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeFavorite(btn.dataset.delete);
    });
  });
}

function toggleFavorite(id) {
  const station = STATIONS.find(s => s.id === id);
  if (!station) return;
  if (favorites.has(id)) {
    favorites.delete(id);
    showToast(`${station.name} eliminada`);
  } else {
    favorites.add(id);
    showToast(`${station.name} añadida`);
  }
  saveFavorites();
  render();
}

function removeFavorite(id) {
  const station = STATIONS.find(s => s.id === id);
  if (!station) return;
  favorites.delete(id);
  saveFavorites();
  showToast(`${station.name} eliminada`);
  render();
}

function clearAllFavorites() {
  favorites.clear();
  saveFavorites();
  showToast('Favoritas vaciadas');
  render();
}

let modalAction = null;

function openModal(title, text, onConfirm) {
  modalTitle.textContent = title;
  modalText.textContent = text;
  modalAction = onConfirm;
  modal.classList.add('visible');
}

function closeModal() {
  modal.classList.remove('visible');
  modalAction = null;
}

modalConfirm.addEventListener('click', () => {
  if (modalAction) modalAction();
  closeModal();
});

modalCancel.addEventListener('click', closeModal);
modal.addEventListener('click', (e) => {
  if (e.target === modal) closeModal();
});

clearAllBtn.addEventListener('click', () => {
  openModal(
    '¿Vaciar favoritas?',
    `Se eliminarán las ${favorites.size} emisoras favoritas. Esta acción no se puede deshacer.`,
    clearAllFavorites
  );
});

function cleanupHls() {
  if (hls) {
    hls.destroy();
    hls = null;
  }
}

function setStatus(text, type) {
  statusText.textContent = text;
  playerStatus.classList.remove('error', 'connecting');
  if (type === 'error') playerStatus.classList.add('error');
  if (type === 'connecting') playerStatus.classList.add('connecting');
}

function playStation(id) {
  const station = STATIONS.find(s => s.id === id);
  if (!station) return;

  currentStationId = id;
  playerName.textContent = station.name;
  playerIcon.textContent = getInitial(station.name);
  setStatus('CONECTANDO…', 'connecting');
  player.classList.add('visible');

  cleanupHls();
  const isHls = station.url.includes('.m3u8');

  if (isHls && !audio.canPlayType('application/vnd.apple.mpegurl') && window.Hls && Hls.isSupported()) {
    hls = new Hls({ enableWorker: true });
    hls.loadSource(station.url);
    hls.attachMedia(audio);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      audio.play().then(() => {
        isPlaying = true;
        setStatus('EN DIRECTO');
        updatePlayIcon();
        render();
      }).catch(() => {
        setStatus('ERROR DE CONEXIÓN', 'error');
        isPlaying = false;
        updatePlayIcon();
      });
    });
    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        setStatus('STREAM NO DISPONIBLE', 'error');
        isPlaying = false;
        updatePlayIcon();
      }
    });
  } else {
    audio.src = station.url;
    audio.play().then(() => {
      isPlaying = true;
      setStatus('EN DIRECTO');
      updatePlayIcon();
      render();
    }).catch(() => {
      setStatus('ERROR DE CONEXIÓN', 'error');
      isPlaying = false;
      updatePlayIcon();
    });
  }
}

function togglePlay() {
  if (!currentStationId) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    setStatus('PAUSA');
  } else {
    audio.play().then(() => {
      isPlaying = true;
      setStatus('EN DIRECTO');
    }).catch(() => setStatus('ERROR', 'error'));
  }
  updatePlayIcon();
}

function updatePlayIcon() {
  if (isPlaying) {
    playIcon.innerHTML = '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
  } else {
    playIcon.innerHTML = '<path d="M6 4l15 8-15 8z"/>';
  }
}

function stopPlayer() {
  audio.pause();
  audio.src = '';
  cleanupHls();
  isPlaying = false;
  currentStationId = null;
  player.classList.remove('visible');
  render();
}

let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('visible'), 2200);
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    render();
  });
});

searchInput.addEventListener('input', (e) => {
  searchQuery = e.target.value;
  render();
});

playBtn.addEventListener('click', togglePlay);
closeBtn.addEventListener('click', stopPlayer);

volumeSlider.addEventListener('input', (e) => {
  const v = parseInt(e.target.value);
  audio.volume = v / 100;
  try { localStorage.setItem(STORAGE_KEY_VOL, String(v)); } catch (err) {}
});

audio.addEventListener('error', () => {
  if (currentStationId) {
    setStatus('STREAM NO DISPONIBLE', 'error');
    isPlaying = false;
    updatePlayIcon();
  }
});

audio.addEventListener('stalled', () => {
  if (currentStationId && isPlaying) setStatus('RECONECTANDO…', 'connecting');
});

audio.addEventListener('playing', () => {
  setStatus('EN DIRECTO');
});

(async () => {
  loadFavorites();
  loadVolume();

  try {
    const result = await loadStations();
    if (STATIONS.length === 0) throw new Error('Lista vacía');
    STATIONS.sort((a, b) => a.name.localeCompare(b.name, 'es'));
    render();
    if (result.source === 'cache-fallback') {
      showToast('Sin conexión: usando emisoras guardadas');
    }
  } catch (e) {
    console.error(e);
    stationsEl.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="empty-text">Sin conexión</div>
        <div class="empty-hint">No se ha podido cargar la lista. Comprueba tu conexión y recarga la página.</div>
      </div>`;
  }
})();
</script>
</body>
</html>
